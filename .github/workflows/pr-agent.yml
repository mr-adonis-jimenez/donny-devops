name: PR Agent

on:
  pull_request:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Extract changed files
        id: files
        run: |
          echo "files=$(jq -r '.pull_request.changed_files' $GITHUB_EVENT_PATH)" >> $GITHUB_OUTPUT

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "Donny DevOps agent reviewed this PR. Validate security, dependencies, and infra changes before merge."
            })
